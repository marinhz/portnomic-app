<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/Portnomic.svg" type="image/svg+xml" />
    <title>Portnomic</title>
    <script>
      (function() {
        var stored = localStorage.getItem("theme-preference");
        var dark = stored === "dark" || (!stored && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
      })();
    </script>
  </head>
  <body>
    <noscript>
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,sans-serif;background:linear-gradient(135deg,#0f172a,#1e3a5f);color:white;padding:2rem;text-align:center">
        <h1 style="font-size:2rem;margin-bottom:0.5rem">Portnomic</h1>
        <p style="color:#99d6c7;margin-bottom:1.5rem">Maritime Agency Platform</p>
        <p style="font-size:0.875rem;opacity:0.8;margin-bottom:1rem">Enable JavaScript to sign in.</p>
        <a href="https://portnomic.com/privacy-policy" target="_blank" rel="noopener noreferrer" style="color:#99d6c7;font-size:0.75rem;text-decoration:underline">Privacy Policy</a>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
