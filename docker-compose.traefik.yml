# ==============================================================================
# Portnomic App - Traefik deployment (app.portnomic.com)
# ==============================================================================
# Usage on VPS:
#   docker compose -f docker-compose.prod-simple.yml -f docker-compose.traefik.yml up -d
#
# Prerequisites:
#   - Traefik running on the same host (network: web)
#   - DNS: app.portnomic.com → your VPS IP
# ==============================================================================

services:
  app:
    # No host port binding - Traefik routes to container:80 via Docker network (same as your Next.js app).
    ports: []
    labels:
      # Traefik v2/v3 router
      - "traefik.enable=true"
      - "traefik.http.routers.portnomic-app.rule=Host(`app.portnomic.com`)"
      - "traefik.http.routers.portnomic-app.entrypoints=websecure"
      - "traefik.http.routers.portnomic-app.tls=true"
      # Use default cert resolver (Let's Encrypt) if configured
      - "traefik.http.routers.portnomic-app.tls.certresolver=letsencrypt"
      # Service
      - "traefik.http.services.portnomic-app.loadbalancer.server.port=80"
    networks:
      - shipflow-net
      - web

  postgres:
    networks:
      - shipflow-net

  redis:
    networks:
      - shipflow-net

networks:
  shipflow-net:
    driver: bridge
  web:
    external: true
