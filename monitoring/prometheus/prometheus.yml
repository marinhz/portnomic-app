global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: shipflow-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000
    scrape_interval: 10s

  - job_name: shipflow-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:8000
    scrape_interval: 15s

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
