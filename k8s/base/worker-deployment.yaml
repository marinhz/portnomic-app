apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: shipflow
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: shipflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: shipflow
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: worker
                    app.kubernetes.io/component: worker
                topologyKey: kubernetes.io/hostname
      containers:
        - name: worker
          image: ghcr.io/shipflow/backend:latest
          command: ["arq", "app.worker.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: shipflow-config
            - secretRef:
                name: shipflow-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - python
                - "-c"
                - "import redis; redis.from_url(__import__('os').environ['REDIS_URL']).ping()"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - "-c"
                - "import redis; redis.from_url(__import__('os').environ['REDIS_URL']).ping()"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
