# WARNING: DO NOT COMMIT real secret values to version control.
# Replace base64 placeholders below with actual values, or better yet,
# use Sealed Secrets / external-secrets-operator (see sealed-secret-instructions.md).
apiVersion: v1
kind: Secret
metadata:
  name: shipflow-secrets
  namespace: shipflow
  labels:
    app.kubernetes.io/part-of: shipflow
type: Opaque
data:
  # echo -n "postgresql+asyncpg://user:pass@postgres:5432/shipflow" | base64
  DATABASE_URL: CHANGEME_BASE64_ENCODED
  # echo -n "redis://redis:6379/0" | base64
  REDIS_URL: CHANGEME_BASE64_ENCODED
  JWT_SECRET: CHANGEME_BASE64_ENCODED
  MFA_ENCRYPTION_KEY: CHANGEME_BASE64_ENCODED
  LLM_API_KEY: CHANGEME_BASE64_ENCODED
  WEBHOOK_INBOUND_SECRET: CHANGEME_BASE64_ENCODED
  STORAGE_S3_ACCESS_KEY: CHANGEME_BASE64_ENCODED
  STORAGE_S3_SECRET_KEY: CHANGEME_BASE64_ENCODED
  SMTP_USER: CHANGEME_BASE64_ENCODED
  SMTP_PASSWORD: CHANGEME_BASE64_ENCODED
  IMAP_PASSWORD: CHANGEME_BASE64_ENCODED
