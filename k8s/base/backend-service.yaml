apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: shipflow
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: shipflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
