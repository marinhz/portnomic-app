# ==============================================================================
# ShipFlow AI - Development with all-in-one container
# ==============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Runs: postgres + redis (from base) + app (all-in-one: API + worker + frontend)
# Frontend: http://localhost
# API:      http://localhost/api
# ==============================================================================

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.all-in-one
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-shipflow}:${POSTGRES_PASSWORD:-shipflow_dev}@postgres:5432/${POSTGRES_DB:-shipflow}?ssl=disable
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-shipflow}:${POSTGRES_PASSWORD:-shipflow_dev}@postgres:5432/${POSTGRES_DB:-shipflow}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://127.0.0.1","http://127.0.0.1:80"]'
      ENVIRONMENT: ${ENVIRONMENT:-development}
      OAUTH_REDIRECT_BASE_URL: http://localhost/api
      OAUTH_FRONTEND_SUCCESS_URL: http://localhost/settings/integrations
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
