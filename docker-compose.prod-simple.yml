# ==============================================================================
# ShipFlow AI - Simple production (all-in-one)
# ==============================================================================
# Usage: docker compose -f docker-compose.prod-simple.yml up -d
#
# One app container (API + worker + frontend) + postgres + redis.
# For staging, demo, or single-VM deployments.
#
# For scaling (separate backend/worker/frontend), use docker-compose.prod.yml.
# ==============================================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shipflow}
      POSTGRES_USER: ${POSTGRES_USER:-shipflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - shipflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shipflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - shipflow-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.all-in-one
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-shipflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shipflow}?ssl=disable
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-shipflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shipflow}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost","http://127.0.0.1"]'
      ENVIRONMENT: production
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shipflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

networks:
  shipflow-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
